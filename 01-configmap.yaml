apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-services
  namespace: homelab
  annotations:
    # Services are auto-discovered from k8s Services and Docker containers.
    # Add entries here only for services that can't be auto-detected
    # (e.g. running on a different host, bare-metal process without Docker).
    # Changes take effect on the next /api/services poll (no pod restart needed).
data:
  services.json: |
    []
