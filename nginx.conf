server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* calls to the backend Kubernetes service.
    # "homelab-backend" is the k8s Service name in the same namespace.
    location /api/ {
        proxy_pass         http://homelab-backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # React SPA — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for the root html so new builds are picked up
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
