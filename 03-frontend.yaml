apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-frontend
  namespace: homelab
  labels:
    app: homelab-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homelab-frontend
  template:
    metadata:
      labels:
        app: homelab-frontend
    spec:
      containers:
        - name: frontend
          image: homelab-frontend:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 3000

          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: homelab-frontend
  namespace: homelab
spec:
  selector:
    app: homelab-frontend
  # NodePort exposes the dashboard on every node at a fixed port.
  # Access it at http://YOUR-NODE-IP:30300
  type: NodePort
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
